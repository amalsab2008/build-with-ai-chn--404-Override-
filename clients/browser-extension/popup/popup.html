<!DOCTYPE html>
<html>
<head>
  <title>SentinelAI Protection</title>
  <style>
    body {
      background-color: #050505;
      color: #e5e7eb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 16px;
      width: 320px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 12px;
    }
    .logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #06b6d4, #2563eb);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
    }
    .logo svg {
      color: white;
      width: 20px;
      height: 20px;
    }
    .title {
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 14px;
    }
    .status-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      margin-bottom: 16px;
    }
    .status-icon {
      color: #10b981;
      animation: pulse 2s infinite;
      margin-bottom: 8px;
    }
    .status-text {
      color: #10b981;
      font-weight: 600;
      font-size: 16px;
      margin: 0;
    }
    .metric {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-top: 1px dotted rgba(255, 255, 255, 0.1);
      font-size: 13px;
    }
    .metric-value {
      font-weight: bold;
      color: #06b6d4;
    }
    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
    </div>
    <div class="title">SentinelAI <span style="color:#06b6d4;">Web Protection</span></div>
  </div>

  <div class="status-card">
    <div class="status-icon">
      <svg width="32" height="32" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="margin:0 auto; display:block;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
    </div>
    <p class="status-text">Active & Defending</p>
    <p style="font-size: 11px; color:#9ca3af; margin-top:4px;">Connected to Enterprise Gateway</p>
  </div>

  <div class="metric">
    <span>Threats Blocked Today</span>
    <span class="metric-value">0</span>
  </div>
  <div class="metric">
    <span>Urls Analyzed</span>
    <span class="metric-value" style="color:#e5e7eb">Live</span>
  </div>
</body>
</html>
